# Configuration example for WidowX 250s (W250) robot arm with ROS2
#
# NOTE: When using ROS2, this config does NOT need a port parameter.
# The Interbotix control node handles the USB connection to the robot.
#
# Before using, launch the control node:
#   $ ros2 launch interbotix_xsarm_control xsarm_control.launch.py \
#       robot_model:=wx250s \
#       port:=/dev/ttyUSB0

# Robot identification
robot_model: wx250s   # Interbotix model name
robot_name: wx250s    # ROS2 namespace for the robot

# ── Frequency ─────────────────────────────────────────────────────────────────
# Single value — everything else derives from it automatically:
#   moving_time = 1 / fps    (robot trajectory time = one control loop period)
#   accel_time  = moving_time / 4
#   camera fps  = fps        (overridden automatically in __post_init__)
# Must also match: lerobot_record --dataset.fps
fps: 15
moving_time: 0.15   # safe for teleop; use 0.067 (1/fps) for policy replay

# Gripper parameters
gripper_pressure: 0.5
gripper_pressure_lower_limit: 150
gripper_pressure_upper_limit: 350

# Safety parameters
max_relative_target: null
disable_torque_on_disconnect: true

# Camera configuration — fps is auto-set to match robot fps above.
# Uses Intel RealSense D415 cameras identified by serial number.
# Run `python3 -m lerobot.scripts.lerobot_find_cameras` to list available cameras and serials.
cameras:
  cam_wrist:
    type: intelrealsense
    serial_number_or_name: "220322061194"
    width: 640
    height: 480
    # fps: set automatically to match robot fps (12)
  cam_front:
    type: intelrealsense
    serial_number_or_name: "217222063884"
    width: 640
    height: 480
    # fps: set automatically to match robot fps (12)
